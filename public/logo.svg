<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <style>
      .text-primary { fill: #0f172a; font-family: system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 85px; letter-spacing: -2px; }
      .text-secondary { fill: #64748b; font-family: system-ui, -apple-system, sans-serif; font-weight: 300; font-size: 85px; letter-spacing: -1px; }
      @media (prefers-color-scheme: dark) {
        .text-primary { fill: #ffffff; }
        .text-secondary { fill: #94a3b8; }
      }
    </style>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="gradShadow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon scaled and positioned to the left -->
  <g transform="translate(-10, -20) scale(0.45)">
    <path d="M 170 160 
             C 170 70, 240 90, 256 120 
             C 272 90, 342 70, 342 160 
             C 342 250, 310 290, 290 390 
             C 280 430, 260 430, 256 390 
             L 256 310 
             L 256 390 
             C 252 430, 232 430, 222 390 
             C 202 290, 170 250, 170 160 Z" 
          fill="url(#grad)" filter="url(#glow)"/>

    <path d="M 170 160 
             C 170 70, 240 90, 256 120 
             C 272 90, 342 70, 342 160 
             C 342 250, 310 290, 290 390 
             C 280 430, 260 430, 256 390 
             L 256 310 
             L 256 390 
             C 252 430, 232 430, 222 390 
             C 202 290, 170 250, 170 160 Z" 
          fill="url(#gradShadow)"/>
          
    <circle cx="210" cy="150" r="15" fill="#ffffff" opacity="0.6" filter="blur(2px)"/>
  </g>

  <!-- Text aligned vertically to the center of the icon -->
  <text x="180" y="130">
    <tspan class="text-primary">DentalLab</tspan>
    <tspan class="text-secondary" dx="15">Manager</tspan>
  </text>
</svg>
